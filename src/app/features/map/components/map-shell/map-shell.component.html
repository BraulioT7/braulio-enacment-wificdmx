<section class="map-view">
  <app-map-filters 
    [alcaldias]="availableAlcaldias()" 
    (filterChanged)="onFilterChanged($event)">
  </app-map-filters>

  <button class="map-view__locate-btn" (click)="findNearest()">
     Encontrar cercanos a mí
  </button>

  <button class="map-view__fav-toggle" (click)="isSidebarOpen.set(true)">
    Mis Favoritos
  </button>

  <div id="wifi-map" class="map-view__container"></div>

  @if (selectedPoint(); as point) {
    <div class="map-detail-card">
      <button class="map-detail-card__close" (click)="closeDetail()">✕</button>
      <h3 class="map-detail-card__title">{{ point.programa }}</h3>
      <p class="map-detail-card__info"><b>Alcaldía:</b> {{ point.alcaldia }}</p>
      
      @if (point.score !== undefined) {
        <div class="map-detail-card__score-box">
          <p class="map-detail-card__info"><b>Distancia:</b> {{ point.distanciaKm }} km</p>
          <p class="map-detail-card__info">
            <b>Score de Proximidad:</b> 
            <span class="score-badge" [class.high-score]="point.score > 70">
              {{ point.score }}/100
            </span>
          </p>
        </div>
      }

      <button 
        class="map-detail-card__fav-btn" 
        [class.is-fav]="isFavorite(point.id)"
        (click)="toggleFavorite(point)">
        {{ isFavorite(point.id) ? '★ Quitar Favorito' : '☆ Guardar Favorito' }}
      </button>
    </div>
  }

  @if (isSidebarOpen()) {
    <app-map-favorites-sidebar 
      (closeSidebar)="isSidebarOpen.set(false)"
      (focusPoint)="flyToPoint($event)">
    </app-map-favorites-sidebar>
  }
  
</section>
